version: '3'
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - backend_yolo
    environment:
      - BACKEND_YOLO_URL=http://backend_yolo:8001

  backend_yolo:
    build: ./backend_yolo
    ports:
      - "8001:8001"
